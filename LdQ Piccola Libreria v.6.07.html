    const pool = isFemaleName(name) ? femaleEmojis : maleEmojis;
    const idx = name.split("").reduce((acc, c) => acc + c.charCodeAt(0), 0) % pool.length;

    const jobs = [
      ["insegnante di liceo", "abbastanza soddisfatta/o, anche se i voti da dare tolgono il sonno"],

    ];
    const genreReasons = {

      fantasy: "il fantasy le/gli ha insegnato che i mondi impossibili rivelano verit\xE0 profondissime su quello reale.",
      horror: "l'horror le/gli piace perch\xE9 mette in scena le paure che di giorno si fingono di non avere.",
      storica: "\xE8 convinta/o che capire il passato sia l'unico modo sensato di abitare il presente.",

    const seed = (name + surname).split("").reduce((a, c) => a + c.charCodeAt(0), 0);
    const city = cities[seed % cities.length];
