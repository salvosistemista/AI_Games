<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Monsters &amp; Labyrinths</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#0c0f12; }
  #root { height:100%; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
(() => {
  const { useEffect, useRef } = React;
  const THREE_CDN_URL = "https://unpkg.com/three@0.128.0/build/three.min.js";
  function loadThreeJs() {
    if (typeof window.THREE !== "undefined") {
      return Promise.resolve(window.THREE);
    }
    if (!window.__threeLoadingPromise) {
      window.__threeLoadingPromise = new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = THREE_CDN_URL;
        script.async = true;
        script.onload = () => {
          if (typeof window.THREE !== "undefined") resolve(window.THREE);
          else reject(new Error("three.js caricato ma window.THREE non \xE8 definito."));
        };
        script.onerror = () => {
          reject(new Error("Impossibile scaricare three.js da " + THREE_CDN_URL));
        };
        document.head.appendChild(script);
      });
    }
    return window.__threeLoadingPromise;
  }
  const GAME_VERSION = "v1.22";
  const GAME_STYLE = `
  html, body {
      height: 100%;
  }
  body {
      margin: 0; padding: 0; overflow: hidden;
      background-color: #0c0f12; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; color: #e0e6ed;
  }
  #game-container {
      position: relative; width: 100vw; height: 100vh;
      /* 100dvh (viewport dinamico) tiene conto della barra degli
         indirizzi dei browser mobile, a differenza di 100vh che su
         telefono include anche l'area che sparisce quando si scorre.
         I browser che non conoscono "dvh" ignorano questa riga e
         restano sul valore "vh" qui sopra. */
      height: 100dvh;
      /* Rete di sicurezza per i browser mobile che NON supportano
         "dvh" (in quel caso il bug di "100vh" persiste): --app-vh
         viene calcolato in JavaScript da window.innerHeight (il vero
         spazio visibile in quel momento, aggiornato ad ogni resize) e
         sovrascrive tutto quello che c'\xE8 sopra, appena il gioco parte. */
      height: var(--app-vh, 100dvh);
      max-width: 500px; max-height: 850px; margin: 0 auto;
      box-shadow: 0 0 30px rgba(0,0,0,0.9); background: #0b0d10;
  }
  canvas { width: 100% !important; height: 100% !important; display: block; }

  .ui-screen {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: #0d1117; z-index: 200; display: flex; flex-direction: column;
      box-sizing: border-box; padding: 25px; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
  }
  h1, h2, h3 { text-align: center; color: #00ffcc; margin-top: 10px; letter-spacing: 1px; }
  h1 { font-size: 26px; text-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }

  /* Su schermi bassi (telefoni in orizzontale, telefoni piccoli, o
     verticale con tastiera aperta) si stringono i margini/spaziature
     principali, cos\xEC schermate lunghe come la Creazione Personaggio
     entrano senza dover scorrere. Lo scroll resta comunque attivo
     come rete di sicurezza per i casi limite. */
  @media (max-height: 720px) {
    .ui-screen { padding: 14px 20px; }
    h1 { font-size: 21px; margin-top: 12px; margin-bottom: 12px; }
    h2 { margin: 6px 0; font-size: 18px; }
    .btn { padding: 9px; margin: 5px 0; font-size: 14px; }
    .stat-allocator { padding: 4px 12px; margin: 2px 0; }
    .build-selector-grid { gap: 4px; margin-bottom: 8px; }
    .input-field { padding: 9px; margin-bottom: 8px; }
  }
  @media (max-height: 600px) {
    .ui-screen { padding: 10px 16px; }
    h1 { font-size: 18px; margin-top: 8px; margin-bottom: 8px; }
    .stat-allocator { padding: 2px 10px; }
  }

  .btn {
      background: #161b22; border: 1px solid #30363d; color: #c9d1d9;
      padding: 14px; margin: 8px 0; border-radius: 6px; font-size: 15px;
      font-weight: bold; cursor: pointer; text-align: center; transition: all 0.2s;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-primary { background: #238636; border-color: #2ea44f; color: white; }
  .btn-primary:not(:disabled):hover { background: #2ea44f; }
  .btn-danger { background: #da3637; border-color: #f85149; color: white; }
  .btn-action { border-color: #00ffcc; color: #00ffcc; background: rgba(0,255,204,0.05); }

  .slot-card {
      position: relative;
      background: #161b22; border: 1px solid #30363d; border-radius: 8px;
      padding: 12px; margin: 10px 0; cursor: pointer; display: flex;
      justify-content: space-between; align-items: center; transition: border 0.2s;
  }
  .slot-info { display: flex; flex-direction: column; gap: 5px; }
  .slot-delete-btn {
      position: absolute; top: 6px; right: 6px; width: 22px; height: 22px;
      border-radius: 50%; background: rgba(218,54,55,0.15); border: 1px solid rgba(248,81,73,0.5);
      color: #f85149; font-size: 11px; font-weight: bold; cursor: pointer; line-height: 1;
      display: flex; align-items: center; justify-content: center;
  }

  .input-field {
      background: #0d1117; border: 1px solid #30363d; color: white;
      padding: 12px; border-radius: 6px; font-size: 15px; width: 100%;
      box-sizing: border-box; text-align: center; margin-bottom: 12px;
  }
  .input-field:focus { border-color: #00ffcc; outline: none; }

  .build-selector-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 12px; }
  .build-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .build-btn {
      background: #21262d; border: 1px solid #30363d; color: #8b949e;
      padding: 8px 4px; border-radius: 4px; font-size: 11px; font-weight: bold;
      cursor: pointer; text-align: center; width: 100%; box-sizing: border-box;
  }
  .build-btn.active { background: rgba(0,255,204,0.15); border-color: #00ffcc; color: white; }
  .delete-build-btn { background: #21262d; border: 1px solid #f85149; color: #f85149; font-size: 9px; padding: 2px 6px; border-radius: 3px; cursor: pointer; font-weight: bold; }

  .stat-allocator {
      background: #161b22; border-radius: 6px; padding: 6px 12px;
      margin: 4px 0; display: flex; justify-content: space-between; align-items: center;
  }
  .stat-label { font-weight: bold; font-size: 14px; min-width: 90px; }
  .stat-controls { display: flex; align-items: center; gap: 12px; }
  .circle-btn {
      width: 28px; height: 28px; border-radius: 50%; border: 1px solid #30363d;
      background: #30363d; color: white; font-weight: bold; display: flex;
      align-items: center; justify-content: center; cursor: pointer;
  }

  .custom-modal {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(11, 13, 16, 0.95); z-index: 300;
      display: none; flex-direction: column; justify-content: center; padding: 20px; box-sizing: border-box;
  }
  .modal-content { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 20px; display: flex; flex-direction: column; gap: 10px; }

  .preview-box { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 10px; font-size: 12px; }
  .preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 5px; text-align: center; }
  .preview-stat { background: #161b22; padding: 4px; border-radius: 4px; font-weight: bold; border: 1px solid #30363d; }

  #confirm-modal { z-index: 400; }
  #confirm-modal-text { color: #e0e6ed; font-size: 14px; text-align: center; line-height: 1.4; margin: 4px 0 10px; }
  #equip-picker-modal { z-index: 410; }

  #hud {
      position: absolute; top: 10px; left: 10px; right: 10px;
      color: white; background: rgba(11,13,16,0.85); padding: 12px;
      border-radius: 6px; z-index: 10; font-size: 12px;
      display: none; flex-direction: column; gap: 4px; border: 1px solid #30363d; pointer-events: none;
  }
  .hud-row { display: flex; justify-content: space-between; align-items: center; }

  /* Barre HP/XP */
  .bar-label-row { display: flex; justify-content: space-between; font-size: 10px; color: #8b949e; margin-top: 4px; }
  .bar-track { background: #1f242c; border-radius: 4px; height: 8px; overflow: hidden; }
  .bar-fill-hp { height: 100%; background: #2ee44f; width: 0%; transition: width 0.25s; }
  .bar-fill-xp { height: 100%; background: #00d2ff; width: 0%; transition: width 0.25s; }

  /* Barra di notifica oggetti trovati (fino a 3, sotto HP/XP/Oro) */
  #loot-toast {
      display: none; flex-direction: column; gap: 3px; margin-top: 4px;
      overflow: hidden; transition: max-height 0.25s ease;
  }
  .loot-toast-item {
      background: rgba(46, 228, 79, 0.12); border: 1px solid #2ee44f; color: #2ee44f;
      font-size: 11px; font-weight: bold; padding: 5px 8px; border-radius: 5px;
      animation: loot-pop 0.25s ease-out;
  }
  @keyframes loot-pop { from { transform: translateY(-6px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  #levelup-toast {
      position: absolute; top: 100px; left: 10px; right: 10px;
      display: none; z-index: 16; text-align: center;
      background: rgba(46, 228, 79, 0.15); border: 1px solid #2ee44f;
      color: #2ee44f; font-size: 12px; font-weight: bold;
      padding: 8px 10px; border-radius: 6px; pointer-events: none;
  }

  #stairs-hint {
      position: absolute; top: 100px; left: 10px; right: 10px;
      display: none; z-index: 15; text-align: center;
      background: rgba(241, 196, 15, 0.15); border: 1px solid #f1c40f;
      color: #f1c40f; font-size: 12px; font-weight: bold;
      padding: 8px 10px; border-radius: 6px; pointer-events: none;
  }

  /* ---------------- CLUSTER AZIONI: Esci + accordion personaggio/statistiche ---------------- */
  #action-cluster {
      position: absolute; bottom: 20px; left: 20px; z-index: 50; display: none;
      flex-direction: column; align-items: flex-start; gap: 8px;
      transition: opacity 0.2s;
  }
  #action-cluster.hand-left { left: auto; right: 20px; align-items: flex-end; }

  #btn-exit-game {
      background: rgba(218, 54, 55, 0.85); border: 1px solid #f85149; color: white;
      font-size: 12px; font-weight: bold; padding: 10px 16px; border-radius: 6px;
      cursor: pointer; white-space: nowrap;
  }

  #bottom-row { display: flex; align-items: center; gap: 8px; }
  #action-cluster.hand-left #bottom-row { flex-direction: row-reverse; }

  .square-toggle, .toggle-horizontal, .toggle-vertical {
      flex-shrink: 0;
      background: rgba(22,27,34,0.85); border: 1px solid #30363d; color: #00ffcc;
      font-weight: bold; border-radius: 6px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
  }
  .square-toggle { width: 40px; height: 40px; min-width: 40px; font-size: 16px; }
  /* Toggle orizzontale (fra "Esci" e "Inven"): fa scorrere una riga di
     pulsanti in orizzontale, quindi resta stretto e alto quanto Esci. */
  .toggle-horizontal { width: 24px; height: 40px; min-width: 24px; font-size: 13px; }
  /* Toggle verticale (sopra "Esci"): fa scorrere una colonna di
     pulsanti in verticale, quindi resta basso e largo. */
  .toggle-vertical { width: 40px; height: 24px; min-width: 40px; font-size: 13px; }

  #char-toggle-row {
      display: flex; gap: 6px; overflow: hidden; max-width: 0;
      transition: max-width 0.3s ease;
  }
  #char-toggle-row.open { max-width: 320px; }
  #action-cluster.hand-left #char-toggle-row { flex-direction: row-reverse; }

  #stats-toggle-row {
      display: flex; flex-direction: column-reverse; gap: 6px; align-items: flex-start;
      overflow: hidden; max-height: 0;
      transition: max-height 0.3s ease;
  }
  #stats-toggle-row.open { max-height: 220px; }
  #action-cluster.hand-left #stats-toggle-row { align-items: flex-end; }

  .slide-btn {
      background: rgba(22,27,34,0.85); border: 1px solid #30363d; color: #c9d1d9;
      font-size: 11px; font-weight: bold; padding: 10px 10px; border-radius: 6px;
      cursor: pointer; white-space: nowrap;
  }

  #dpad-container {
      position: absolute;
      bottom: 60px; right: 50px;
      width: 170px; height: 170px;
      z-index: 50; display: none;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(3, 1fr);
      gap: 6px;
      transition: opacity 0.2s;
  }
  .dpad-btn {
      background: rgba(22, 27, 34, 0.6);
      border: 1px solid rgba(0, 255, 204, 0.35);
      color: rgba(0, 255, 204, 0.8);
      border-radius: 8px; font-weight: bold; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; backdrop-filter: blur(2px);
  }
  .dpad-btn:active { background: rgba(0, 255, 204, 0.3); color: white; border-color: #00ffcc; }
  .dpad-rot-btn { border-color: rgba(165, 94, 234, 0.4); color: rgba(165, 94, 234, 0.8); font-size: 15px; }
  .dpad-rot-btn:active { background: rgba(165, 94, 234, 0.25); color: white; border-color: #a55eea; }

  /* ---------------- OVERLAY DI INCONTRO NEMICO ---------------- */
  #encounter-overlay {
      position: absolute; top: 5%; left: 5%; width: 90%; height: 90%;
      background: rgba(9, 11, 15, 0.74); backdrop-filter: blur(3px);
      border: 1px solid rgba(0, 255, 204, 0.3); border-radius: 18px;
      z-index: 150; display: none; flex-direction: column;
      align-items: center; justify-content: center; box-sizing: border-box; padding: 20px;
  }
  #btn-encounter-flee {
      position: absolute;
      background: #da3637; border: 1px solid #f85149; color: white;
      padding: 9px 16px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer;
      transform: translate(-50%, -50%);
  }
  #encounter-name { color: #00ffcc; font-size: 20px; font-weight: bold; margin-bottom: 10px; text-align: center; letter-spacing: 1px; }
  .monster-art { margin-bottom: 18px; }
  .monster-art svg { display: block; animation: float-monster 3s ease-in-out infinite; }
  @keyframes float-monster { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  @keyframes pulse-eye { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.55; transform: scale(1.2); } }
  .eye-anim { animation: pulse-eye 1.1s infinite; transform-origin: center; }
  #encounter-hp-bar-bg, #encounter-player-hp-bar-bg { width: 70%; max-width: 260px; height: 12px; background: #1f242c; border-radius: 6px; overflow: hidden; margin-bottom: 4px; }
  #encounter-hp-fill { height: 100%; background: #da3637; width: 100%; transition: width 0.3s; }
  #encounter-player-hp-fill { height: 100%; background: #2ee44f; width: 100%; transition: width 0.3s; }
  #encounter-hp-label, #encounter-player-hp-label { color: #c9d1d9; font-size: 12px; margin-bottom: 8px; }
  #encounter-hint { color: #8b949e; font-size: 11px; text-align: center; margin-top: 8px; }

  /* ---------------- COMBATTIMENTO A TEMPO (QTE) ---------------- */
  .qte-label { font-size: 14px; font-weight: bold; margin-top: 4px; min-height: 18px; text-align: center; }
  .qte-label-attack { color: #f1c40f; }
  .qte-label-defense { color: #00d2ff; }
  .qte-feedback { font-size: 13px; font-weight: bold; min-height: 18px; text-align: center; display: none; }
  .qte-feedback-good { color: #2ee44f; }
  .qte-feedback-bad { color: #ff4d4d; }

  #qte-reticle {
      position: absolute; width: 54px; height: 54px; margin-left: -27px; margin-top: -27px;
      border-radius: 50%; display: none; align-items: center; justify-content: center;
      font-size: 24px; cursor: pointer; z-index: 220;
      animation: qte-pulse-ring linear forwards;
  }
  .qte-attack { background: rgba(241, 196, 15, 0.25); border: 3px solid #f1c40f; box-shadow: 0 0 14px rgba(241,196,15,0.5); }
  .qte-defense { background: rgba(0, 210, 255, 0.25); border: 3px solid #00d2ff; box-shadow: 0 0 14px rgba(0,210,255,0.5); }
  @keyframes qte-pulse-ring { from { transform: scale(1.5); opacity: 0.9; } to { transform: scale(0.6); opacity: 0.35; } }

  /* ---------------- COUNTDOWN PRIMA DEL COMBATTIMENTO ---------------- */
  #countdown-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 5; display: none; align-items: center; justify-content: center;
      flex-direction: column; background: rgba(9, 11, 15, 0.55); border-radius: 18px;
  }
  #countdown-circle {
      width: 220px; height: 220px; border-radius: 50%;
      border: 8px solid #f1c40f; display: flex; align-items: center; justify-content: center;
      background: rgba(241, 196, 15, 0.08);
  }
  .countdown-anim { animation: countdown-shrink 0.5s ease-out; }
  @keyframes countdown-shrink { from { transform: scale(1.4); opacity: 0.3; } to { transform: scale(0.85); opacity: 1; } }
  #countdown-number { font-size: 84px; font-weight: bold; color: #f1c40f; text-shadow: 0 0 12px rgba(241,196,15,0.6); }
  #countdown-fight-text {
      display: none; font-size: 40px; font-weight: bold; color: #ff4d4d;
      text-shadow: 0 0 16px rgba(255,77,77,0.7); letter-spacing: 2px;
  }
  .fight-pop { animation: fight-pop 0.35s ease-out; }
  @keyframes fight-pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  /* ---------------- FINESTRE DI DETTAGLIO (Stato, Diario, Mappa, Statistiche, Inventario, Equip.) ---------------- */
  .detail-overlay {
      position: absolute; top: 5%; left: 5%; width: 90%; height: 90%;
      background: rgba(13, 17, 23, 0.97); border: 1px solid rgba(0, 255, 204, 0.25);
      border-radius: 16px; z-index: 160; display: none; flex-direction: column;
      box-sizing: border-box; padding: 20px; overflow: hidden;
  }
  .detail-fixed-top { flex-shrink: 0; }
  .detail-scroll-area { flex: 1; overflow-y: auto; min-height: 0; padding-bottom: 50px; -webkit-overflow-scrolling: touch; }
  /* Nell'Inventario la fascia fissa in basso (filtri + ordina) prende
     gi\xE0 il posto lasciato libero per il pulsante di chiusura, quindi
     l'area scorrevole non ha pi\xF9 bisogno di quel grande spazio extra. */
  .inventory-scroll-area { padding-bottom: 8px; }
  #inventory-summary {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; color: #8b949e; margin-top: 6px;
  }
  .detail-fixed-bottom {
      flex-shrink: 0; border-top: 1px solid #21262d;
      padding: 10px 14px 4px 54px; /* spazio a sx per non coprire il pulsante \u2715 */
  }
  .detail-overlay.hand-left .detail-fixed-bottom { padding: 10px 54px 4px 14px; }
  #inventory-filter-row { display: flex; flex-wrap: wrap; gap: 4px; }
  .inventory-filter-btn { flex: 1; min-width: 58px; text-align: center; padding: 7px 4px; margin: 0; font-size: 10px; }
  .inventory-filter-btn.active { border-color: #00ffcc; color: #00ffcc; background: rgba(0,255,204,0.08); }
  .close-btn {
      position: absolute; bottom: 14px; left: 14px; width: 32px; height: 32px;
      border-radius: 50%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.25);
      color: #c9d1d9; font-size: 14px; font-weight: bold; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
  }
  .detail-overlay.hand-left .close-btn { left: auto; right: 14px; }

  #status-header { text-align: center; color: #8b949e; font-size: 13px; margin-bottom: 6px; }
  .status-section-title {
      font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 1px;
      margin: 16px 0 8px; border-bottom: 1px solid #21262d; padding-bottom: 4px;
  }
  .status-row {
      display: flex; justify-content: space-between; align-items: center;
      background: #161b22; border: 1px solid #21262d; border-radius: 6px;
      padding: 8px 12px; margin-bottom: 6px; font-size: 13px;
  }
  .status-row .label { font-weight: bold; color: #e0e6ed; }
  .status-row .breakdown { color: #8b949e; font-size: 11px; margin-top: 2px; }
  .status-row .total { color: #00ffcc; font-weight: bold; font-size: 16px; margin-left: 8px; white-space: nowrap; }
  .status-note { font-size: 11px; color: #58606b; margin-top: 6px; font-style: italic; line-height: 1.4; }

  /* ---------------- DIARIO ---------------- */
  #diario-entries { display: flex; flex-direction: column; gap: 6px; }
  .diario-entry { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 8px 10px; font-size: 12px; border-left-width: 3px; border-left-style: solid; }
  .diario-entry.type-livello { border-left-color: #a55eea; }
  .diario-entry.type-nemico { border-left-color: #da3637; }
  .diario-entry.type-oggetto { border-left-color: #2ee44f; }
  .diario-entry.type-piano { border-left-color: #f1c40f; }
  .diario-entry.type-sistema { border-left-color: #00d2ff; }
  .diario-meta { color: #8b949e; font-size: 10px; margin-bottom: 2px; }
  #diario-filter-row { display: flex; flex-wrap: wrap; gap: 6px; padding-top: 10px; border-top: 1px solid #21262d; margin-bottom: 40px; flex-shrink: 0; }
  .diario-filter-btn { flex: 1; min-width: 62px; text-align: center; padding: 8px 4px; margin: 0; }
  .diario-filter-btn.active { border-color: #00ffcc; color: #00ffcc; background: rgba(0,255,204,0.08); }

  /* ---------------- MAPPA ---------------- */
  #map-grid-wrapper { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 6px 0; min-height: 0; }
  #map-grid { display: grid; gap: 1px; background: #21262d; padding: 4px; border-radius: 6px; }
  .map-cell { border-radius: 2px; }
